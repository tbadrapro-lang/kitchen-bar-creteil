<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN & BAR | Courtyard by Marriott Paris Créteil ⭐ 3.1 (26)</title>
    
    <!-- Fonts Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons & Animations -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --marriott-gold: #D4AF37;
            --marriott-dark: #0F1419;
            --marriott-charcoal: #1A2526;
            --marriott-cream: #F8F1E9;
            --marriott-wine: #4A2C2A;
            --shadow-gold: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--marriott-dark); 
            color: var(--marriott-cream); 
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* ========== HEADER LUXE ========== */
        header {
            position: fixed; top: 0; width: 100%; z-index: 10000;
            background: rgba(15, 20, 25, 0.98); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 1rem 0;
        }
        .header-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 1.8rem; font-weight: 600; 
            color: var(--marriott-gold); 
            text-decoration: none; 
            letter-spacing: 2px;
        }
        .nav-menu { display: flex; list-style: none; gap: 3rem; }
        .nav-menu a { 
            color: var(--marriott-cream); text-decoration: none; 
            font-weight: 500; font-size: 0.9rem; 
            text-transform: uppercase; letter-spacing: 1px;
            position: relative; transition: all 0.3s ease;
        }
        .nav-menu a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--marriott-gold); transition: 0.3s; }
        .nav-menu a:hover::after { width: 100%; }
        .nav-menu a:hover { color: var(--marriott-gold); }
        
        .mobile-menu { display: none; color: var(--marriott-gold); font-size: 1.5rem; cursor: pointer; }

        /* ========== HERO CINEMATIQUE ========== */
        .hero {
            height: 100vh; 
            background: linear-gradient(135deg, rgba(15,20,25,0.8), rgba(74,44,42,0.6)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect fill="%230F1419" width="1920" height="1080"/><text x="50%" y="50%" font-size="60" fill="%23D4AF37" text-anchor="middle" dy=".3em" font-family="serif">KITCHEN & BAR</text></svg>');
            background-size: cover; background-position: center; position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(212,175,55,0.1) 50%, transparent 70%);
            animation: shimmer 6s infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:0;transform:translateX(-100%)}50%{opacity:1;transform:translateX(100%)}}
        
        .hero-content h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(4rem, 10vw, 7rem); 
            margin-bottom: 1rem; 
            letter-spacing: 0.1em;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .hero-subtitle { 
            font-size: 1.3rem; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            margin-bottom: 2rem; 
            opacity: 0.9;
        }
        .rating-badge {
            display: inline-flex; align-items: center; gap: 1rem; background: rgba(212,175,55,0.2);
            padding: 1rem 2rem; border-radius: 50px; backdrop-filter: blur(10px);
            border: 1px solid rgba(212,175,55,0.3);
        }
        .stars { color: var(--marriott-gold); font-size: 1.2rem; }
        .price-tag { background: var(--marriott-gold); color: var(--marriott-dark); padding: 0.5rem 1.5rem; border-radius: 25px; font-weight: 600; }

        /* ========== SECTIONS ========== */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
        section { padding: 120px 0; }
        .section-title {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem);
            text-align: center; margin-bottom: 4rem; position: relative;
        }
        .section-title::after {
            content: ''; display: block; width: 100px; height: 3px; background: var(--marriott-gold);
            margin: 1rem auto; border-radius: 2px;
        }

        /* ========== CARTE GASTRONOMIQUE COMPLÈTE ========== */
        .menu-category { margin-bottom: 8rem; }
        .category-title { 
            font-size: 2.2rem; text-align: center; margin-bottom: 3rem; 
            color: var(--marriott-gold); position: relative;
        }
        .category-title::after { 
            content: ''; width: 80px; height: 2px; background: var(--marriott-cream); 
            margin: 1rem auto; opacity: 0.5;
        }

        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 2.5rem;
        }
        .menu-item {
            background: rgba(26, 37, 38, 0.6); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 20px; overflow: hidden; transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            backdrop-filter: blur(10px); position: relative;
        }
        .menu-item::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--marriott-gold), transparent);
            transform: scaleX(0); transition: transform 0.4s;
        }
        .menu-item:hover { 
            transform: translateY(-15px); border-color: var(--marriott-gold); box-shadow: var(--shadow-gold);
        }
        .menu-item:hover::before { transform: scaleX(1); }
        
        .item-image {
            width: 100%; height: 280px; object-fit: cover;
            background: linear-gradient(45deg, #111, #333);
        }
        .item-content { padding: 2rem; }
        .item-header { 
            display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem;
            border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 1rem;
        }
        .item-name { 
            font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500;
        }
        .item-price { 
            font-size: 1.4rem; font-weight: 700; color: var(--marriott-gold);
        }
        .item-desc { 
            opacity: 0.8; margin-bottom: 1.5rem; line-height: 1.6;
        }
        .btn-add {
            width: 100%; padding: 1rem; background: transparent; 
            border: 2px solid var(--marriott-gold); color: var(--marriott-gold);
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
            font-family: inherit;
        }
        .btn-add:hover { background: var(--marriott-gold); color: var(--marriott-dark); transform: scale(1.02); }

        /* ========== AVIS & TÉMOIGNAGES ========== */
        .reviews-section { background: linear-gradient(135deg, var(--marriott-charcoal), var(--marriott-dark)); }
        .reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 3rem; }
        .review-card {
            background: rgba(26,37,38,0.6); padding: 3rem; border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.2); position: relative; height: 100%;
        }
        .review-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .review-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--marriott-gold); }
        .stars { color: var(--marriott-gold); font-size: 1.1rem; }

        /* ========== CONTACT & RESA ========== */
        .cta-section {
            background: linear-gradient(135deg, var(--marriott-wine), var(--marriott-charcoal));
            text-align: center; position: relative; overflow: hidden;
        }
        .cta-content { max-width: 800px; margin: 0 auto; }
        .cta-title { font-size: 3rem; margin-bottom: 1rem; }
        .contact-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin: 3rem 0; }
        .contact-item { text-align: center; }
        .contact-icon { font-size: 3rem; color: var(--marriott-gold); margin-bottom: 1rem; }

        /* ========== FOOTER ELEGANT ========== */
        footer {
            background: var(--marriott-dark); padding: 4rem 0 2rem; border-top: 1px solid rgba(212,175,55,0.1);
            text-align: center;
        }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; margin-bottom: 2rem; }
        .footer-section h3 { color: var(--marriott-gold); margin-bottom: 1rem; font-family: 'Cormorant Garamond', serif; }
        .social-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
        .social-links a { color: var(--marriott-cream); font-size: 1.5rem; transition: 0.3s; }
        .social-links a:hover { color: var(--marriott-gold); transform: translateY(-3px); }

        /* ========== PANIER LATERAL ========== */
        #cart-panel {
            position: fixed; right: -450px; top: 0; width: 450px; height: 100vh; z-index: 20000;
            background: rgba(15,20,25,0.98); backdrop-filter: blur(30px); transition: right 0.4s ease;
            border-left: 1px solid rgba(212,175,55,0.3); overflow-y: auto; padding: 2rem;
        }
        #cart-panel.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .cart-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .cart-total { font-size: 1.8rem; font-weight: 700; margin: 2rem 0; text-align: right; }
        .btn-checkout {
            width: 100%; padding: 1.5rem; background: var(--marriott-gold); color: var(--marriott-dark);
            border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-checkout:hover { transform: scale(1.02); box-shadow: var(--shadow-gold); }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 15000; opacity: 0; visibility: hidden;
            transition: all 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .mobile-menu { display: block; }
            .hero h1 { font-size: 3rem; }
            .menu-grid { grid-template-columns: 1fr; }
            #cart-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-container">
            <a href="#" class="logo">Kitchen & Bar</a>
            <ul class="nav-menu">
                <li><a href="#menu-entrees">Entrées</a></li>
                <li><a href="#menu-plats">Plats</a></li>
                <li><a href="#menu-desserts">Desserts</a></li>
                <li><a href="#avis">Avis</a></li>
                <li><a href="#contact">Réservation</a></li>
            </ul>
            <i class="fas fa-bars mobile-menu" onclick="toggleMobileMenu()"></i>
            <div class="cart-toggle" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero" data-aos="fade-in">
        <div class="hero-content">
            <h1>L'Art<br>Culinaire</h1>
            <p class="hero-subtitle">Courtyard by Marriott Paris Créteil</p>
            <div class="rating-badge">
                <div class="stars">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                    <i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                </div>
                <span>3.1 • 26 avis</span>
                <div class="price-tag">20-30€</div>
            </div>
        </div>
    </section>

    <!-- MENU COMPLET -->
    <section id="menu-entrees">
        <div class="container">
            <h2 class="section-title" data-aos="fade-up">Pour Commencer</h2>
            <div class="menu-category" id="menu-entrees">
                <div class="menu-grid">
                    <div class="menu-item" data-aos="fade-up" data-aos-delay="100">
                        <div class="item-image" style="background: linear-gradient(135deg, #8B4513, #D2691E)"></div>
                        <div class="item-content">
                            <div class="item-header">
                                <h3 class="item-name">Velouté de Châtaigne</h3>
                                <span class="item-price">9€</span>
                            </div>
                            <p class="item-desc">Velouté onctueux de châtaignes de saison, émulsion légère de crème fraîche.</p>
                            <button class="btn-add" onclick="addToCart('Velouté de Châtaigne', 9)">Ajouter</button>
                        </div>
                    </div>

                    <div class="menu-item" data-aos="fade-up" data-aos-delay="200">
                        <div class="item-image" style="background: linear-gradient(135deg, #654321, #A0522D)"></div>
